<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ScreenAI - AI Resume Screener">
    <title>ScreenAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['var(--font-heading-name)', 'sans-serif'],
            body: ['var(--font-body-name)', 'sans-serif'],
          },
          animation: {
            'shimmer':   'shimmer 3s linear infinite',
            'pulse-dot': 'pulseDot 2s ease-in-out infinite',
            'fade-up':   'fadeUp 0.6s ease-out forwards',
          },
          keyframes: {
            shimmer:   { '0%': { backgroundPosition: '0% 50%' }, '50%': { backgroundPosition: '100% 50%' }, '100%': { backgroundPosition: '0% 50%' } },
            pulseDot:  { '0%, 100%': { opacity: '1', transform: 'scale(1)' }, '50%': { opacity: '0.4', transform: 'scale(1.5)' } },
            fadeUp:    { '0%': { opacity: '0', transform: 'translateY(14px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        }
      }
    }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- STAR FIELD -->
<canvas id="starfield"></canvas>
<div class="nebula"></div>

<!-- APP SHELL -->
<div class="app-shell">

  <!-- ── LEFT PANEL ── -->
  <section class="panel-scroll flex flex-col" style="width:42%; padding:28px; overflow-y:auto; flex-shrink:0;">

    <!-- Header -->
    <div style="margin-bottom:16px;">
      <p style="font-family:var(--font-heading); font-size:11px; text-transform:uppercase; letter-spacing:0.18em; color:rgba(124,106,247,0.7); margin-bottom:4px;">ScreenAI</p>
      <h1 style="font-size:18px; font-weight:700; color:#ffffff;">Upload CVs &amp; Job Description</h1>
    </div>
    <div style="height:1px; background:rgba(124,106,247,0.15); margin-bottom:20px;"></div>

    <!-- Upload Zone -->
    <div class="upload-zone" style="padding:28px 20px; display:flex; flex-direction:column; align-items:center; margin-bottom:20px;">
      <div style="color:#7c6af7; filter:drop-shadow(0 0 8px rgba(124,106,247,0.6)); margin-bottom:10px;">
        <i data-lucide="cloud-upload" style="width:24px; height:24px;"></i>
      </div>
      <p style="font-size:13px; color:#d1d5db; margin-bottom:4px;">Drop PDF resumes here</p>
      <p style="font-size:11px; color:rgba(255,255,255,0.3); margin-bottom:14px;">· Max 10 files · PDF only</p>
      <button style="font-family:var(--font-body); font-size:11px; background:rgba(124,106,247,0.15); border:1px solid rgba(124,106,247,0.4); border-radius:20px; padding:4px 14px; color:#a89cf7; cursor:pointer;">Browse files</button>
    </div>

    <!-- Uploaded Files — starts empty, JS fills this -->
    <div style="margin-bottom:20px;">
      <p id="file-count-label" style="font-family:var(--font-body); font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.35); margin-bottom:8px;">Uploaded Files (0/10)</p>
      <div id="file-list-container"></div>
    </div>

    <!-- Job Description -->
    <div style="flex:1; display:flex; flex-direction:column;">
      <p style="font-family:var(--font-body); font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.35); margin-bottom:6px;">Job Description</p>
      <textarea class="jd-textarea" placeholder="Paste the job description here — role requirements, skills, and responsibilities…"></textarea>
    </div>

    <!-- Analyse Button -->
    <div class="btn-sticky-wrap" style="margin-top:20px;">
      <button class="btn-analyse">
        <span style="font-family:var(--font-heading); font-size:14px; font-weight:700; color:#ffffff; letter-spacing:0.02em;">✦ Analyse All CVs with AI →</span>
      </button>
    </div>

  </section>

  <!-- Divider -->
  <div class="divider-col"></div>

  <!-- ── RIGHT PANEL ── -->
  <section id="right-panel" class="panel-scroll flex flex-col" style="flex:1; padding:28px; overflow-y:auto;">

    <!-- Header -->
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:16px;">
      <div>
        <p style="font-family:var(--font-heading); font-size:11px; text-transform:uppercase; letter-spacing:0.18em; color:rgba(124,106,247,0.7); margin-bottom:4px;">AI RESULTS</p>
        <h1 style="font-size:18px; font-weight:700; color:#ffffff;">AI Rankings</h1>
      </div>
      <div style="display:flex; align-items:center; gap:7px; background:rgba(62,207,142,0.1); border:1px solid rgba(62,207,142,0.25); border-radius:20px; padding:3px 10px;">
        <div style="width:7px; height:7px; border-radius:50%; background:#3ecf8e; animation:pulseDot 2s ease-in-out infinite;"></div>
        <span style="font-family:var(--font-body); font-size:11px; color:#3ecf8e;">Live</span>
      </div>
    </div>
    <div style="height:1px; background:rgba(124,106,247,0.15); margin-bottom:20px;"></div>

    <!-- Empty state — shown before AI runs -->
    <div id="empty-state" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 20px;">
      <div style="color:#7c6af7; filter:drop-shadow(0 0 10px rgba(124,106,247,0.5)); margin-bottom:16px;">
        <i data-lucide="sparkles" style="width:40px; height:40px;"></i>
      </div>
      <p style="font-family:var(--font-heading); font-size:15px; font-weight:700; color:#fff; margin-bottom:8px;">No results yet</p>
      <p style="font-size:12px; color:rgba(255,255,255,0.3); line-height:1.6;">Upload CVs, paste a job description,<br>and click Analyse to see AI rankings here.</p>
    </div>

    <!-- Results inject here — filled by script.js -->
    <div id="results-container"></div>

  </section>
</div>

<!-- SCRIPTS -->
<script>
/* Lucide icons */
lucide.createIcons();

/* STAR FIELD */
(function () {
  var canvas = document.getElementById('starfield');
  var ctx    = canvas.getContext('2d');
  var stars  = [];
  var W = 0, H = 0;

  function buildStars(w, h) {
    stars = [];
    var count = Math.floor(w * h / 3500);
    for (var i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.0 + 0.4,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 1.8 + 0.6
      });
    }
  }

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W;
    canvas.height = H;
    buildStars(W, H);
  }

  function draw(ts) {
    var t = ts * 0.001;
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var opacity = 0.15 + 0.70 * (0.5 + 0.5 * Math.sin(s.phase + t * s.speed));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + opacity.toFixed(3) + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(draw);
})();
</script>

<script src="script.js"></script>
</body>
</html>
